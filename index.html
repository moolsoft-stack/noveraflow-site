<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoveraFlow</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f3ea 0%, #eef4ef 100%);
      color: #1f2a24;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .card {
      max-width: 760px;
    }

    .brand {
      font-size: 20px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6f7f72;
      margin-bottom: 48px;
    }

    h1 {
      font-size: clamp(38px, 7vw, 76px);
      line-height: 1.15;
      margin: 0 0 28px;
      font-weight: 600;
    }

    p {
      font-size: clamp(17px, 2.2vw, 22px);
      line-height: 1.8;
      color: #4c5b51;
      margin: 0 auto;
      max-width: 640px;
    }

    .note {
      margin-top: 56px;
      font-size: 15px;
      color: #7a877d;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">NoveraFlow</div>

      <h1>
        짧은 기록들이 쌓이면,<br />
        삶의 흐름이 드러납니다.
      </h1>

      <p>
        NoveraFlow는 기록을 강요하지 않고,<br />
        반복되는 감정과 생각의 흐름을 조용히 바라보는<br />
        AI 라이프 플랫폼입니다.
      </p>

      <div class="note">
        First version is quietly in progress.
      </div>
    </section>
  </main>
</body>
</html>
