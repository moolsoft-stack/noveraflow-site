<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NoveraFlow preview image</title>
  <desc id="desc">A quiet NoveraFlow brand image centered on the main symbol.</desc>
  <defs>
    <radialGradient id="paper" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#f7f8f0"/>
      <stop offset="0.58" stop-color="#f4f6f1"/>
      <stop offset="1" stop-color="#e7eee6"/>
    </radialGradient>
    <linearGradient id="flowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#445d4d" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6f97a5" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#d5a94f" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#2d372f" flood-opacity="0.12"/>
    </filter>
    <clipPath id="iconCrop">
      <rect x="0" y="0" width="288" height="288" rx="70"/>
    </clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <path d="M-80 330 C180 250 355 390 580 314 C778 248 952 294 1280 238" fill="none" stroke="url(#flowLine)" stroke-width="5"/>
  <path d="M-70 410 C214 330 386 462 604 388 C798 322 965 386 1260 330" fill="none" stroke="#718b76" stroke-opacity="0.12" stroke-width="3"/>
  <circle cx="254" cy="186" r="5" fill="#445d4d" opacity="0.18"/>
  <circle cx="934" cy="448" r="6" fill="#b47d62" opacity="0.16"/>
  <circle cx="1012" cy="198" r="4" fill="#6f97a5" opacity="0.16"/>
  <g transform="translate(456 154)" filter="url(#softShadow)" clip-path="url(#iconCrop)">
    <image href="noveraflow-icon-1024.png" x="-24" y="-24" width="336" height="336" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <text x="600" y="505" text-anchor="middle" fill="#1f2b28" font-family="Nunito Sans, Arial, sans-serif" font-size="58" font-weight="700">NoveraFlow</text>
  <text x="600" y="552" text-anchor="middle" fill="#6c746f" font-family="Nunito Sans, Arial, sans-serif" font-size="24" font-weight="600">A quiet diary for living patterns</text>
</svg>
